<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <title>Lindt Chocolate Maze</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { background: #f5f0e8; }
    body {
      width: 1440px; margin: 0 auto;
      min-height: 5818px;
      background: url('tlo_strony.png') no-repeat top left;
      background-size: 1440px auto;
      position: relative;
    }
    #zone {
      position: absolute;
      top: 237px; left: 0;
      width: 1440px; height: 400px;
      overflow: hidden;
      background: #ffffff;
    }
    #gc { position: absolute; inset: 0; }

    #hud {
      position: absolute; inset: 0;
      display: none; pointer-events: none;
      z-index: 20; font-family: 'Georgia', serif; color: #4a1800;
    }
    #hud.on { display: block; }

    #hud-title {
      position: absolute; top: 14px; left: 50%; transform: translateX(-50%);
      font: 500 13px/1 'Georgia', serif; letter-spacing: 3px; color: #4a1800;
      white-space: nowrap;
    }
    #hud-hint {
      position: absolute; left: 216px; top: 50%; transform: translateY(-50%);
      font: 400 15px/1.7 'Georgia', serif; color: rgba(60,20,0,0.55);
      letter-spacing: 0.3px; max-width: 160px;
    }
    #hud-timer {
      position: absolute; right: 258px; top: 50%; transform: translateY(-50%);
      font: 400 38px/1 'Georgia', serif; color: #3a1200; letter-spacing: 2px;
    }

    .screen {
      position: absolute; inset: 0;
      display: none;
      z-index: 40;
    }
    .screen.on { display: block; }

    /* ── Welcome screen ── */
    #scr-ready {
      background: url('background.jpg') 50% 50% / 74% no-repeat;
    }
    #scr-ready h2 {
      position: absolute;
      left: 19%; top: 49%;
      transform: translateY(-50%);
      font: 400 47px/1.15 'Georgia', serif;
      color: #fff;
      text-shadow: 0 2px 18px rgba(0,0,0,0.55);
      letter-spacing: 1px;
      margin: 0; white-space: nowrap;
    }
    #scr-ready .right-col {
      position: absolute;
      right: 16%; bottom: 16%;
      display: flex; flex-direction: column; align-items: flex-end; gap: 14px;
    }
    #loading-msg { font: 13px 'Georgia', serif; color: rgba(255,255,255,0.75); letter-spacing: .5px; }

    /* ── Win screen ── */
    #scr-win {
      background: #fff;
      display: none; flex-direction: column;
      align-items: center; justify-content: center;
      font-family: 'Georgia', serif; text-align: center;
    }
    #scr-win.on { display: flex; }

    #win-gif-wrap {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      pointer-events: none;
      transition: opacity 0.6s;
    }
    #win-gif-wrap.hidden { opacity: 0; }
    #win-gif { max-width: 60%; max-height: 60%; }

    #win-content {
      display: flex; flex-direction: column; align-items: center; gap: 14px;
      opacity: 0; transition: opacity 0.6s;
    }
    #win-content.visible { opacity: 1; }

    #win-time { font-size: 15px; color: #888; margin: 0; letter-spacing: 1px; }
    #win-heading { font-size: 32px; font-weight: 400; color: #3a1200; margin: 0; letter-spacing: 2px; }
    #win-sub { font-size: 14px; color: #7a4020; margin: 0; }

    #promo-wrap {
      display: flex; align-items: center; gap: 10px;
      border: 1.5px dashed #c8960c; padding: 12px 22px;
      background: #fffbf2; margin: 4px 0;
    }
    #promo-code { font: 700 20px/1 'Courier New', monospace; color: #3a1200; letter-spacing: 3px; }
    #btn-copy {
      background: none; border: 1px solid #c8960c; color: #c8960c;
      font: 11px 'Georgia', serif; padding: 5px 10px; cursor: pointer;
      letter-spacing: 1px; transition: background .15s, color .15s;
    }
    #btn-copy:hover { background: #c8960c; color: #fff; }
    #copy-confirm { font-size: 11px; color: #888; min-height: 14px; }

    .gold-btn {
      background: #c8960c;
      color: #fff; border: none; padding: 14px 71px;
      font: 600 16px/1 'Georgia', serif; letter-spacing: 1px;
      cursor: pointer; transition: background .15s;
    }
    .gold-btn:hover { background: #a87008; }
    .sub { font: 11px 'Georgia', serif; color: rgba(255,255,255,0.65); letter-spacing: .5px; }
  </style>
</head>
<body>
<div id="zone">
  <canvas id="gc"></canvas>
  <canvas id="dbg-canvas" style="position:absolute;inset:0;pointer-events:none;display:none;"></canvas>

  <div id="hud">
    <div id="hud-title">CHOCOLATE MAZE</div>
    <div id="hud-hint">The ball wants to escape the maze, help it. Use the arrow keys.</div>
    <div id="hud-timer">00:00</div>
  </div>

  <div class="screen" id="scr-ready">
    <h2 id="ready-title">Chocolate Maze</h2>
    <div class="right-col" id="ready-right">
      <div id="loading-msg">Ładowanie modelu…</div>
      <button class="gold-btn" id="btn-play">Let's play</button>
      <div class="sub">← → ↑ ↓ &nbsp;·&nbsp; ESC = reset</div>
    </div>
  </div>

  <div class="screen" id="scr-win">
    <div id="win-gif-wrap">
      <img id="win-gif" src="hurray.gif" alt="">
    </div>
    <div id="win-content">
      <p id="win-time">Time: 00:00</p>
      <h2 id="win-heading">Thank you!</h2>
      <p id="win-sub">Claim your Lindt reward!</p>
      <div id="promo-wrap">
        <span id="promo-code">LINDT-MAZE-2026</span>
        <button id="btn-copy">COPY</button>
      </div>
      <div id="copy-confirm"></div>
      <button class="gold-btn" id="btn-retry">Play it again!</button>
    </div>
  </div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.158.0/examples/jsm/",
    "three-mesh-bvh": "https://cdn.jsdelivr.net/npm/three-mesh-bvh@0.6.8/build/index.module.js",
    "lil-gui": "https://cdn.jsdelivr.net/npm/lil-gui@0.19/dist/lil-gui.esm.js"
  }
}
</script>
<script type="module">
import * as THREE from 'three';
import GUI from 'lil-gui';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { computeBoundsTree, disposeBoundsTree, acceleratedRaycast } from 'three-mesh-bvh';

THREE.BufferGeometry.prototype.computeBoundsTree = computeBoundsTree;
THREE.BufferGeometry.prototype.disposeBoundsTree  = disposeBoundsTree;
THREE.Mesh.prototype.raycast = acceleratedRaycast;

/* ══════════════════════════════════════════════
   CONSTANTS
══════════════════════════════════════════════ */
const W = 1440, H = 400;
const MAZE_SCALE = 17;   // scale to match old game dimensions (~MX=6, MZ=2.5)
const BR = 0.20;         // ball radius — smaller than wall height so ball sits inside corridors
const HOLE_X_NUDGE = 0.5; // shift hole marker/win-zone right into the geometric gap

let MX = 6.0, MZ = 2.5; // updated after model loads

const GCOLS = 128, GROWS = 56; // double resolution → cellWidth≈0.095, max wall penetration <0.05

const SHOW_DEBUG_GRID = false;

// Manual start/goal overrides. null = auto-detect. Enable SHOW_DEBUG_GRID and
// click the canvas to read world coords, then paste them here.
const MANUAL_START = null; // e.g. { x: -4.0, z: -0.8 }
const MANUAL_GOAL  = null; // e.g. {  x:  3.5, z:  0.9 }

const GRAVITY     = 18;
const FRICTION    = 0.965;
const RESTITUTION = 0.20;
const MAX_TILT    = Math.PI / 7;
const TILT_STEP   = 0.014;
const TILT_LERP   = 0.10;

/* ══════════════════════════════════════════════
   RENDERER
══════════════════════════════════════════════ */
const canvas   = document.getElementById('gc');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(W, H);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type    = THREE.PCFSoftShadowMap;
renderer.outputColorSpace  = THREE.SRGBColorSpace;
renderer.toneMapping       = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.15;

/* ══════════════════════════════════════════════
   SCENE / CAMERA / LIGHTS
══════════════════════════════════════════════ */
const scene = new THREE.Scene();
scene.background = new THREE.Color(0xffffff);

const camera = new THREE.PerspectiveCamera(32, W / H, 0.1, 100);
camera.position.set(0, 14.0, 0);
camera.rotation.set(-Math.PI / 2, 0, 0);

const ambLight = new THREE.AmbientLight(0xfff4ec, 2.80);
scene.add(ambLight);

const sun = new THREE.DirectionalLight(0xfff8f2, 1.70);
sun.position.set(8.0, 14.0, 2.0);
sun.castShadow = true;
sun.shadow.mapSize.set(2048, 2048);
sun.shadow.camera.left   = -10;  sun.shadow.camera.right = 10;
sun.shadow.camera.top    =  10;  sun.shadow.camera.bottom = -10;
sun.shadow.camera.near   =  0.5; sun.shadow.camera.far   = 35;
sun.shadow.bias = -0.001;
scene.add(sun);

const fill = new THREE.DirectionalLight(0xffe0cc, 0.80);
fill.position.set(-5, 5, -3);
scene.add(fill);

const bounce = new THREE.DirectionalLight(0xffd8b8, 0.00);
bounce.position.set(0, -4, 3);
scene.add(bounce);

const sun2 = new THREE.DirectionalLight(0xffffff, 7.60);
sun2.position.set(-8.0, 5.5, -3.0);
scene.add(sun2);

/* ══════════════════════════════════════════════
   MAZE GROUP
══════════════════════════════════════════════ */
const mazeGroup = new THREE.Group();
scene.add(mazeGroup);

/* ══════════════════════════════════════════════
   MATERIALS
══════════════════════════════════════════════ */
const _texLoader = new THREE.TextureLoader();
const _chocTex = _texLoader.load('chocolate_texture.png', tex => {
  tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
  tex.repeat.set(1, 1);
  tex.colorSpace = THREE.SRGBColorSpace;
  // Trigger material updates once texture is ready
  matWall.needsUpdate  = true;
  matFloor.needsUpdate = true;
});

const matWall = new THREE.MeshStandardMaterial({
  map: _chocTex,
  color: 0xcab5aa,
  roughness: 0.87,
  metalness: 0.37,
  side: THREE.DoubleSide,
});
const matFloor = new THREE.MeshStandardMaterial({
  map: _chocTex,
  color: 0x704c38,
  roughness: 0.82,
  metalness: 0.02,
});
const matBall = new THREE.MeshStandardMaterial({
  color: 0xf5f0ea, roughness: 0.08, metalness: 0.85,
});
const matStart = new THREE.MeshStandardMaterial({
  color: 0x44dd66, roughness: 0.3,
  emissive: new THREE.Color(0x007722), emissiveIntensity: 1.2,
});
const matGoal = new THREE.MeshStandardMaterial({
  color: 0xffd700, roughness: 0.08, metalness: 0.96,
  emissive: new THREE.Color(0xff5500), emissiveIntensity: 1.1,
});

/* ══════════════════════════════════════════════
   SCENE EDITOR (lil-gui)
   Press G to toggle panel visibility.
   Click "Kopiuj ustawienia" to print final
   values to console — paste them into the code.
══════════════════════════════════════════════ */
function setupGUI() {
  const gui = new GUI({ title: 'Scene Editor', width: 280 });

  // ── Lights ──────────────────────────────────
  const lf = gui.addFolder('Światła');
  const lp = {
    ambIntensity:    ambLight.intensity,
    ambColor:        '#' + ambLight.color.getHexString(),
    sunIntensity:    sun.intensity,
    sunX: sun.position.x, sunZ: sun.position.z,
    fillIntensity:   fill.intensity,
    bounceIntensity: bounce.intensity,
    exposure:        renderer.toneMappingExposure,
  };
  const bgp = { bgColor: '#' + scene.background.getHexString() };
  lf.addColor(bgp, 'bgColor').name('Tło (kolor)').onChange(v => scene.background.set(v));

  lf.add(lp, 'ambIntensity',    0, 6,  0.05).name('Ambient intensity').onChange(v => ambLight.intensity = v);
  lf.addColor(lp, 'ambColor').name('Ambient kolor').onChange(v => ambLight.color.set(v));
  lf.add(lp, 'sunIntensity',    0, 10, 0.1) .name('Sun intensity')    .onChange(v => sun.intensity = v);
  lf.add(lp, 'sunX',           -10, 10, 0.5).name('Sun pozycja X')    .onChange(v => { sun.position.x = v; });
  lf.add(lp, 'sunZ',           -10, 10, 0.5).name('Sun pozycja Z')    .onChange(v => { sun.position.z = v; });
  lf.add(lp, 'fillIntensity',   0, 4,  0.05).name('Fill intensity')   .onChange(v => fill.intensity = v);
  lf.add(lp, 'bounceIntensity', 0, 3,  0.05).name('Bounce intensity') .onChange(v => bounce.intensity = v);
  lf.add(lp, 'exposure',        0, 3,  0.05).name('Ekspozycja')       .onChange(v => renderer.toneMappingExposure = v);

  const s2f = gui.addFolder('Światło 2 (dodatkowe)');
  const s2p = {
    intensity: sun2.intensity,
    color: '#' + sun2.color.getHexString(),
    posX: sun2.position.x,
    posY: sun2.position.y,
    posZ: sun2.position.z,
  };
  s2f.add(s2p, 'intensity', 0, 8, 0.05).name('Intensywność').onChange(v => sun2.intensity = v);
  s2f.addColor(s2p, 'color').name('Kolor').onChange(v => sun2.color.set(v));
  s2f.add(s2p, 'posX', -12, 12, 0.5).name('Pozycja X').onChange(v => sun2.position.x = v);
  s2f.add(s2p, 'posY', -5,  20, 0.5).name('Pozycja Y').onChange(v => sun2.position.y = v);
  s2f.add(s2p, 'posZ', -12, 12, 0.5).name('Pozycja Z').onChange(v => sun2.position.z = v);

  // ── Wall material ────────────────────────────
  const wf = gui.addFolder('Materiał — ścianki');
  const wp = {
    color:     '#' + matWall.color.getHexString(),
    roughness: matWall.roughness,
    metalness: matWall.metalness,
  };
  wf.addColor(wp, 'color')    .name('Kolor tint')  .onChange(v => matWall.color.set(v));
  wf.add(wp, 'roughness', 0, 1, 0.01).name('Roughness').onChange(v => matWall.roughness = v);
  wf.add(wp, 'metalness', 0, 1, 0.01).name('Metalness').onChange(v => matWall.metalness = v);

  // ── Floor material ───────────────────────────
  const ff = gui.addFolder('Materiał — kanały');
  const fp = {
    color:     '#' + matFloor.color.getHexString(),
    roughness: matFloor.roughness,
    metalness: matFloor.metalness,
  };
  ff.addColor(fp, 'color')    .name('Kolor tint')  .onChange(v => matFloor.color.set(v));
  ff.add(fp, 'roughness', 0, 1, 0.01).name('Roughness').onChange(v => matFloor.roughness = v);
  ff.add(fp, 'metalness', 0, 1, 0.01).name('Metalness').onChange(v => matFloor.metalness = v);

  // ── Copy button ──────────────────────────────
  const actions = {
    kopiujUstawienia() {
      const hex = c => '#' + new THREE.Color(c).getHexString();
      console.log(`
// ── wklej do kodu ──
scene.remove(ambLight);
ambLight.intensity = ${ambLight.intensity.toFixed(2)};
ambLight.color.set('${hex(ambLight.color)}');
scene.add(ambLight);
sun.intensity = ${sun.intensity.toFixed(2)};
sun.position.set(${sun.position.x.toFixed(1)}, ${sun.position.y.toFixed(1)}, ${sun.position.z.toFixed(1)});
fill.intensity = ${fill.intensity.toFixed(2)};
bounce.intensity = ${bounce.intensity.toFixed(2)};
renderer.toneMappingExposure = ${renderer.toneMappingExposure.toFixed(2)};
sun2.intensity = ${sun2.intensity.toFixed(2)}; sun2.color.set('${hex(sun2.color)}'); sun2.position.set(${sun2.position.x.toFixed(1)}, ${sun2.position.y.toFixed(1)}, ${sun2.position.z.toFixed(1)});
matWall.color.set('${hex(matWall.color)}');  matWall.roughness = ${matWall.roughness.toFixed(2)};  matWall.metalness = ${matWall.metalness.toFixed(2)};
matFloor.color.set('${hex(matFloor.color)}'); matFloor.roughness = ${matFloor.roughness.toFixed(2)}; matFloor.metalness = ${matFloor.metalness.toFixed(2)};
scene.background.set('${hex(scene.background)}');
      `.trim());
      alert('Ustawienia skopiowane do konsoli (F12)');
    }
  };
  gui.add(actions, 'kopiujUstawienia').name('📋 Kopiuj ustawienia');

  gui.hide();

  // G = toggle visibility
  document.addEventListener('keydown', e => {
    if (e.key === 'g' || e.key === 'G') gui.show(gui._hidden);
  });
}
setupGUI();

/* ══════════════════════════════════════════════
   LAYOUT EDITOR — Welcome screen positioning
══════════════════════════════════════════════ */
function setupLayoutGUI() {
  const title = document.getElementById('ready-title');
  const rightCol = document.getElementById('ready-right');
  const btnPlay = document.getElementById('btn-play');

  const scrReady = document.getElementById('scr-ready');

  const p = {
    titleLeft:    19,
    titleTop:     49,
    titleSize:    47,
    btnRight:     16,
    btnBottom:    16,
    btnFontSize:  16,
    btnPadV:      14,
    btnPadH:      71,
    bgSize:       74,
    bgPosX:       50,
    bgPosY:       50,
  };

  function applyTitle() {
    title.style.left     = p.titleLeft + '%';
    title.style.top      = p.titleTop  + '%';
    title.style.fontSize = p.titleSize + 'px';
  }
  function applyBtn() {
    rightCol.style.right    = p.btnRight  + '%';
    rightCol.style.bottom   = p.btnBottom + '%';
    btnPlay.style.fontSize  = p.btnFontSize + 'px';
    btnPlay.style.padding   = p.btnPadV + 'px ' + p.btnPadH + 'px';
  }
  function applyBg() {
    scrReady.style.backgroundSize     = p.bgSize + '%';
    scrReady.style.backgroundPosition = p.bgPosX + '% ' + p.bgPosY + '%';
  }
  applyTitle(); applyBtn(); applyBg();

  const lg = new GUI({ title: 'Layout ekranu', width: 240 });

  const bgf = lg.addFolder('Tło (zdjęcie)');
  bgf.add(p, 'bgSize',  50, 300, 1).name('Skala %').onChange(applyBg);
  bgf.add(p, 'bgPosX',   0, 100, 0.5).name('Pozycja X %').onChange(applyBg);
  bgf.add(p, 'bgPosY',   0, 100, 0.5).name('Pozycja Y %').onChange(applyBg);

  const tf = lg.addFolder('Tytuł');
  tf.add(p, 'titleLeft',  0, 80, 0.5).name('Lewo %').onChange(applyTitle);
  tf.add(p, 'titleTop',   0, 100, 0.5).name('Góra %').onChange(applyTitle);
  tf.add(p, 'titleSize', 20, 120, 1).name('Rozmiar px').onChange(applyTitle);

  const bf = lg.addFolder('Przycisk');
  bf.add(p, 'btnRight',   0, 80, 0.5).name('Prawo %').onChange(applyBtn);
  bf.add(p, 'btnBottom',  0, 100, 0.5).name('Dół %').onChange(applyBtn);
  bf.add(p, 'btnFontSize', 10, 36, 1).name('Font px').onChange(applyBtn);
  bf.add(p, 'btnPadV',   4, 40, 1).name('Padding V').onChange(applyBtn);
  bf.add(p, 'btnPadH',   10, 80, 1).name('Padding H').onChange(applyBtn);

  const copyAct = {
    kopiuj() {
      console.log(`
// ── layout ekranu powitalnego ──
#scr-ready { background-size: ${p.bgSize}%; background-position: ${p.bgPosX}% ${p.bgPosY}%; }
#scr-ready h2 { left: ${p.titleLeft}%; top: ${p.titleTop}%; font-size: ${p.titleSize}px; }
#scr-ready .right-col { right: ${p.btnRight}%; bottom: ${p.btnBottom}%; }
.gold-btn { font-size: ${p.btnFontSize}px; padding: ${p.btnPadV}px ${p.btnPadH}px; }
      `.trim());
      alert('Layout skopiowany do konsoli (F12)');
    }
  };
  lg.add(copyAct, 'kopiuj').name('📋 Kopiuj layout');

  lg.hide();
  document.getElementById('btn-play').addEventListener('click', () => lg.hide());
  lg.domElement.style.top = '10px';
  lg.domElement.style.left = '10px';
  lg.domElement.style.right = 'auto';

  // L = toggle layout panel
  document.addEventListener('keydown', e => {
    if (e.key === 'l' || e.key === 'L') lg.show(lg._hidden);
  });
}
setupLayoutGUI();

/* ══════════════════════════════════════════════
   HUD EDITOR
══════════════════════════════════════════════ */
function setupHudGUI() {
  const elTitle  = document.getElementById('hud-title');
  const elHint   = document.getElementById('hud-hint');
  const elTimer  = document.getElementById('hud-timer');

  const p = {
    titleTop:    14,   // px from top
    titleSize:   13,   // px

    hintLeft:    216,
    hintTopPct:  50,
    hintSize:    15,

    timerRight:  258,
    timerTopPct: 50,
    timerSize:   38,
  };

  function applyTitle() {
    elTitle.style.top      = p.titleTop  + 'px';
    elTitle.style.fontSize = p.titleSize + 'px';
  }
  function applyHint() {
    elHint.style.left      = p.hintLeft   + 'px';
    elHint.style.top       = p.hintTopPct + '%';
    elHint.style.fontSize  = p.hintSize   + 'px';
  }
  function applyTimer() {
    elTimer.style.right    = p.timerRight   + 'px';
    elTimer.style.top      = p.timerTopPct  + '%';
    elTimer.style.fontSize = p.timerSize    + 'px';
  }
  applyTitle(); applyHint(); applyTimer();

  const hg = new GUI({ title: 'HUD rozgrywki', width: 240 });

  const tf = hg.addFolder('Tytuł (środek)');
  tf.add(p, 'titleTop',  0, 60, 1).name('Od góry px').onChange(applyTitle);
  tf.add(p, 'titleSize', 8, 32, 1).name('Rozmiar px').onChange(applyTitle);

  const hf = hg.addFolder('Podpowiedź (lewo)');
  hf.add(p, 'hintLeft',   0, 300, 1).name('Od lewej px').onChange(applyHint);
  hf.add(p, 'hintTopPct', 0, 100, 0.5).name('Góra %').onChange(applyHint);
  hf.add(p, 'hintSize',   8, 24,  1).name('Rozmiar px').onChange(applyHint);

  const tmf = hg.addFolder('Timer (prawo)');
  tmf.add(p, 'timerRight',   0, 300, 1).name('Od prawej px').onChange(applyTimer);
  tmf.add(p, 'timerTopPct',  0, 100, 0.5).name('Góra %').onChange(applyTimer);
  tmf.add(p, 'timerSize',   16, 80,  1).name('Rozmiar px').onChange(applyTimer);

  const copyAct = {
    kopiuj() {
      console.log(`
// ── HUD rozgrywki ──
#hud-title  { top: ${p.titleTop}px; font-size: ${p.titleSize}px; }
#hud-hint   { left: ${p.hintLeft}px; top: ${p.hintTopPct}%; font-size: ${p.hintSize}px; }
#hud-timer  { right: ${p.timerRight}px; top: ${p.timerTopPct}%; font-size: ${p.timerSize}px; }
      `.trim());
      alert('Skopiowano do konsoli (F12)');
    }
  };
  hg.add(copyAct, 'kopiuj').name('📋 Kopiuj HUD');

  hg.hide();
  hg.domElement.style.top   = '10px';
  hg.domElement.style.left  = '10px';
  hg.domElement.style.right = 'auto';

  // H = toggle HUD editor
  document.addEventListener('keydown', e => {
    if (e.key === 'h' || e.key === 'H') hg.show(hg._hidden);
  });
}
setupHudGUI();

/* ══════════════════════════════════════════════
   COLLISION GRID
   Built once at load: raycast downward against
   wall mesh (maze_top). HIT = wall, MISS = corridor.
   Floor mesh (maze_down) gives exact ball Y.
══════════════════════════════════════════════ */
let gridData  = null;
let hitYsGrid = null;
let floorY    = 0;

function gIdx(xi, zi) { return zi * GCOLS + xi; }

function gridXZ(xi, zi) {
  return {
    x: -MX + (xi / (GCOLS - 1)) * 2 * MX,
    z: -MZ + (zi / (GROWS - 1)) * 2 * MZ,
  };
}

function gridCell(x, z) {
  return {
    xi: Math.round((x + MX) / (2 * MX) * (GCOLS - 1)),
    zi: Math.round((z + MZ) / (2 * MZ) * (GROWS - 1)),
  };
}

function gridPassable(x, z) {
  if (!gridData) return true;
  const { xi, zi } = gridCell(x, z);
  if (xi < 0 || xi >= GCOLS || zi < 0 || zi >= GROWS) return false;
  return gridData[gIdx(xi, zi)] === 1;
}

function canMoveTo(x, z) { return gridPassable(x, z); }

function cellFloorY(x, z) {
  // Use global minimum so ball sits at consistent depth in all corridors.
  // Per-cell sampling causes the ball to float high in shallower grooves.
  return floorY;
}

/* ══════════════════════════════════════════════
   LOAD GLBs
   maze_top = walls (hit=blocked)
   maze_down = floor (always hit = ball Y)
══════════════════════════════════════════════ */
let wallScene  = null;
let floorScene = null;
let loadCount  = 0;

const loader = new GLTFLoader();
const _rc = new THREE.Raycaster();

function onMeshLoaded() {
  loadCount++;
  if (loadCount < 2) return;

  // Both loaded. Center children inside mazeGroup so local origin = maze center.
  // (mazeGroup stays at world origin — physics uses mazeGroup local coords)
  scene.updateMatrixWorld(true);
  const fb = new THREE.Box3().setFromObject(floorScene);
  const cx = (fb.min.x + fb.max.x) / 2;
  const cz = (fb.min.z + fb.max.z) / 2;
  wallScene.position.x  -= cx;  wallScene.position.z  -= cz;
  floorScene.position.x -= cx;  floorScene.position.z -= cz;
  scene.updateMatrixWorld(true);

  // Compute playfield extents from centered floor (world = local since mazeGroup at origin)
  const fb2 = new THREE.Box3().setFromObject(floorScene);
  MX = (fb2.max.x - fb2.min.x) / 2;
  MZ = (fb2.max.z - fb2.min.z) / 2;

  document.getElementById('loading-msg').textContent = 'Budowanie mapy kolizji…';
  buildGrid();
  finishSetup();
}

loader.load('maze_top.glb',
  gltf => {
    wallScene = gltf.scene;
    wallScene.scale.setScalar(MAZE_SCALE);
    wallScene.traverse(n => {
      if (n.isMesh) {
        n.castShadow    = true;
        n.receiveShadow = true;
        n.material = matWall;
        n.geometry.computeBoundsTree();
      }
    });
    mazeGroup.add(wallScene);
    onMeshLoaded();
  },
  xhr => {
    if (xhr.total)
      document.getElementById('loading-msg').textContent =
        `Ładowanie: ${Math.round(xhr.loaded / xhr.total * 100)}%`;
  },
  err => {
    document.getElementById('loading-msg').textContent = 'Błąd ścian: ' + (err.message || err);
  }
);

loader.load('maze_down.glb',
  gltf => {
    floorScene = gltf.scene;
    floorScene.scale.setScalar(MAZE_SCALE);
    floorScene.traverse(n => {
      if (n.isMesh) {
        n.castShadow    = false;
        n.receiveShadow = true;
        n.material = matFloor;
        n.geometry.computeBoundsTree();
      }
    });
    mazeGroup.add(floorScene);
    onMeshLoaded();
  },
  null,
  err => {
    document.getElementById('loading-msg').textContent = 'Błąd podłogi: ' + (err.message || err);
  }
);

/* ══════════════════════════════════════════════
   BUILD GRID
   Raycast downward at each grid point.
   maze_top HIT  → wall (0)
   maze_top MISS → corridor (1)
   maze_down     → floor Y for ball vertical position
══════════════════════════════════════════════ */
function buildGrid() {
  gridData  = new Uint8Array(GCOLS * GROWS);
  hitYsGrid = new Float32Array(GCOLS * GROWS).fill(1e9);

  for (let zi = 0; zi < GROWS; zi++) {
    for (let xi = 0; xi < GCOLS; xi++) {
      const { x, z } = gridXZ(xi, zi);

      // Ray origin in local mazeGroup space → convert to world
      const wOrigin = mazeGroup.localToWorld(new THREE.Vector3(x, 20, z));
      const wDir    = new THREE.Vector3(0, -1, 0)
                        .transformDirection(mazeGroup.matrixWorld).normalize();
      _rc.set(wOrigin, wDir);

      // Wall check: miss = passable corridor
      const wHits = _rc.intersectObject(wallScene, true);
      gridData[gIdx(xi, zi)] = (wHits.length === 0) ? 1 : 0;

      // Floor Y for ball height
      const fHits = _rc.intersectObject(floorScene, true);
      if (fHits.length > 0) {
        const local = mazeGroup.worldToLocal(fHits[0].point.clone());
        hitYsGrid[gIdx(xi, zi)] = local.y;
      }
    }
  }

  // Exclude only literal grid-edge cells — outer maze walls are in the mesh,
  // so rely on maze_top raycasting rather than a wide artificial RIM.
  const RIM = 2;
  for (let zi = 0; zi < GROWS; zi++)
    for (let xi = 0; xi < GCOLS; xi++)
      if (xi < RIM || zi < RIM || zi >= GROWS - RIM)
        gridData[gIdx(xi, zi)] = 0;

  // Flood-fill from grid centre — keeps only the connected maze interior.
  // Cells outside the model boundary are passable too (no mesh hit) but are
  // isolated by the outer wall mesh, so flood-fill removes them automatically.
  {
    const seed = (() => {
      for (let zi = Math.floor(GROWS / 4); zi < Math.floor(3 * GROWS / 4); zi++)
        for (let xi = Math.floor(GCOLS / 4); xi < Math.floor(3 * GCOLS / 4); xi++)
          if (gridData[gIdx(xi, zi)] === 1) return { xi, zi };
      return null;
    })();
    if (seed) {
      const vis = new Uint8Array(GCOLS * GROWS);
      const q = [seed.xi * GROWS + seed.zi];
      vis[gIdx(seed.xi, seed.zi)] = 1;
      while (q.length) {
        const c = q.pop();
        const xi = Math.floor(c / GROWS), zi = c % GROWS;
        for (const [dx, dz] of [[-1,0],[1,0],[0,-1],[0,1]]) {
          const nx = xi + dx, nz = zi + dz;
          if (nx < 0 || nx >= GCOLS || nz < 0 || nz >= GROWS) continue;
          const ni = gIdx(nx, nz);
          if (gridData[ni] === 1 && !vis[ni]) { vis[ni] = 1; q.push(nx * GROWS + nz); }
        }
      }
      let removed = 0;
      for (let i = 0; i < GCOLS * GROWS; i++)
        if (gridData[i] === 1 && !vis[i]) { gridData[i] = 0; removed++; }
      console.log(`Flood-fill: removed ${removed} isolated passable cells`);
    }
  }

  // Detect hole: scan rightmost 10 columns for passable cells (geometric gap in right wall)
  const HOLE_SCAN = 10;
  holeFound = false;
  let _hXiBest = GCOLS, _hZiSum = 0, _hZiCnt = 0;
  for (let zi = RIM; zi < GROWS - RIM; zi++) {
    for (let xi = GCOLS - HOLE_SCAN; xi < GCOLS; xi++) {
      if (gridData[gIdx(xi, zi)] === 1) {
        if (xi < _hXiBest) _hXiBest = xi;
        _hZiSum += zi; _hZiCnt++;
        holeFound = true;
      }
    }
  }
  if (holeFound) {
    const p = gridXZ(_hXiBest, Math.round(_hZiSum / _hZiCnt));
    holeX = p.x + HOLE_X_NUDGE; holeZ = p.z;
    console.log(`Hole at x=${holeX.toFixed(2)} z=${holeZ.toFixed(2)} (${_hZiCnt} cells)`);
  }

  // Global floor Y = minimum Y of passable cells
  floorY = 1e9;
  for (let i = 0; i < hitYsGrid.length; i++)
    if (gridData[i] === 1 && hitYsGrid[i] < floorY) floorY = hitYsGrid[i];
  if (floorY >= 1e9) floorY = 0;

  const passCount = Array.from(gridData).reduce((s, v) => s + v, 0);
  console.log(`Grid: ${passCount} passable cells | MX=${MX.toFixed(2)} MZ=${MZ.toFixed(2)} floorY=${floorY.toFixed(3)}`);
}

/* ══════════════════════════════════════════════
   BALL + PHYSICS STATE
══════════════════════════════════════════════ */
let ballMesh = null, blobMesh = null;
const ball = { x: 0, z: 0, vx: 0, vz: 0, dropping: false, dropY: 0 };
let startX = 0, startZ = 0, goalX = 0, goalZ = 0;
let holeFound = false, holeX = 0, holeZ = 0;

function findPassablePos(xiMin, xiMax, ziMin, ziMax) {
  for (let zi = ziMin; zi <= ziMax; zi++) {
    for (let xi = xiMin; xi <= xiMax; xi++) {
      if (xi < 0 || xi >= GCOLS || zi < 0 || zi >= GROWS) continue;
      if (gridData[gIdx(xi, zi)] !== 1) continue;
      const { x, z } = gridXZ(xi, zi);
      if (canMoveTo(x, z)) return { x, z };
    }
  }
  return { x: 0, z: 0 };
}

function finishSetup() {
  // START_RIM is separate from buildGrid RIM — keeps start well inside maze
  // regardless of how small the buildGrid RIM is.
  const START_RIM = 8;

  // Start: manual override or first passable cell (upper-left interior)
  if (MANUAL_START) { startX = MANUAL_START.x; startZ = MANUAL_START.z; }
  else {
    const sp = findPassablePos(START_RIM, GCOLS - 1 - START_RIM, START_RIM, GROWS - 1 - START_RIM);
    startX = sp.x; startZ = sp.z;
  }
  // Nudge start away from adjacent walls so ball doesn't begin overlapping them
  const _sR = BR * 0.85;
  if (!gridPassable(startX - _sR, startZ)) startX += _sR;
  if (!gridPassable(startX + _sR, startZ)) startX -= _sR;
  if (!gridPassable(startX, startZ - _sR)) startZ += _sR;
  if (!gridPassable(startX, startZ + _sR)) startZ -= _sR;

  // Goal: manual override → hole (right-wall gap) → farthest Manhattan fallback
  if (MANUAL_GOAL) { goalX = MANUAL_GOAL.x; goalZ = MANUAL_GOAL.z; }
  else if (holeFound) { goalX = holeX; goalZ = holeZ; }
  else {
    let bestDist = -1; goalX = startX; goalZ = startZ;
    for (let zi = 0; zi < GROWS; zi++) {
      for (let xi = 0; xi < GCOLS; xi++) {
        if (!gridData[gIdx(xi, zi)]) continue;
        const { x, z } = gridXZ(xi, zi);
        const d = Math.abs(x - startX) + Math.abs(z - startZ);
        if (d > bestDist) { bestDist = d; goalX = x; goalZ = z; }
      }
    }
  }

  // Ball mesh
  ballMesh = new THREE.Mesh(new THREE.SphereGeometry(BR, 32, 32), matBall);
  ballMesh.castShadow = true;
  mazeGroup.add(ballMesh);

  // Blob shadow — dark disc just above floor
  const blobMat = new THREE.MeshBasicMaterial({
    color: 0x000000, transparent: true, opacity: 0.28,
    depthWrite: false,
  });
  blobMesh = new THREE.Mesh(new THREE.CircleGeometry(BR * 1.1, 24), blobMat);
  blobMesh.rotation.x = -Math.PI / 2;
  mazeGroup.add(blobMesh);
  resetBallPos();

  document.getElementById('loading-msg').style.display = 'none';
  lastT = performance.now();
  console.log(`Start=(${startX.toFixed(2)}, ${startZ.toFixed(2)}) Goal=(${goalX.toFixed(2)}, ${goalZ.toFixed(2)})`);

  if (SHOW_DEBUG_GRID) drawDebugGrid();
}

/* ══════════════════════════════════════════════
   DEBUG GRID OVERLAY
   Green = passable corridor, red = wall.
   Orange box = detected hole (win zone).
══════════════════════════════════════════════ */
function drawDebugGrid() {
  const dbg = document.getElementById('dbg-canvas');
  if (!dbg) return;
  dbg.width = W; dbg.height = H;
  dbg.style.display = 'block';
  const ctx = dbg.getContext('2d');
  ctx.clearRect(0, 0, W, H);

  scene.updateMatrixWorld(true);
  const v = new THREE.Vector3();

  for (let zi = 0; zi < GROWS; zi++) {
    for (let xi = 0; xi < GCOLS; xi++) {
      const { x, z } = gridXZ(xi, zi);
      v.set(x, floorY, z);
      mazeGroup.localToWorld(v);
      v.project(camera);
      const px = (v.x + 1) / 2 * W;
      const py = (1 - v.y) / 2 * H;
      ctx.fillStyle = gridData[gIdx(xi, zi)] === 1
        ? 'rgba(0,220,80,0.50)'
        : 'rgba(200,0,0,0.12)';
      ctx.fillRect(px - 2, py - 2, 4, 4);
    }
  }

  // Highlight hole zone
  if (holeFound) {
    v.set(holeX, floorY, holeZ);
    mazeGroup.localToWorld(v);
    v.project(camera);
    const px = (v.x + 1) / 2 * W;
    const py = (1 - v.y) / 2 * H;
    ctx.strokeStyle = '#ff8800';
    ctx.lineWidth = 2;
    ctx.strokeRect(px - 10, py - 10, 20, 20);
    ctx.fillStyle = '#ff8800';
    ctx.font = '11px monospace';
    ctx.fillText(`hole x=${holeX.toFixed(2)} z=${holeZ.toFixed(2)}`, px + 12, py + 4);
  }
}

/* ══════════════════════════════════════════════
   BALL HELPERS
══════════════════════════════════════════════ */
function resetBallPos() {
  ball.x = startX; ball.z = startZ;
  ball.vx = 0;     ball.vz = 0;
  const sf = cellFloorY(startX, startZ);
  ball.dropY    = sf + BR + 2.5;
  ball.dropping = true;
  if (ballMesh) ballMesh.position.set(ball.x, ball.dropY, ball.z);
}

/* ══════════════════════════════════════════════
   PHYSICS
   Ball in mazeGroup local XZ.
   Gravity from tilt angles — flat model, no offset.
══════════════════════════════════════════════ */
let lastT = 0;
let tiltX = 0, tiltZ = 0, targetTiltX = 0, targetTiltZ = 0;

function applyTilt() {
  tiltX += (targetTiltX - tiltX) * TILT_LERP;
  tiltZ += (targetTiltZ - tiltZ) * TILT_LERP;
  mazeGroup.rotation.x = tiltX;
  mazeGroup.rotation.z = tiltZ;
}

function physicsTick(dt) {
  const groundY = cellFloorY(ball.x, ball.z) + BR;

  if (ball.dropping) {
    ball.dropY -= 8 * dt;
    if (ball.dropY <= groundY) { ball.dropY = groundY; ball.dropping = false; }
    ballMesh.position.set(ball.x, ball.dropY, ball.z);
    blobMesh.position.set(ball.x, groundY - BR + 0.005, ball.z);
    return;
  }

  const gX = GRAVITY * (-Math.sin(tiltZ));
  const gZ = GRAVITY * ( Math.sin(tiltX));

  const SUBSTEPS = 3;
  const sdt = dt / SUBSTEPS;
  for (let s = 0; s < SUBSTEPS; s++) {
    ball.vx += gX * sdt;
    ball.vz += gZ * sdt;

    const f = Math.pow(FRICTION, sdt * 60);
    ball.vx *= f; ball.vz *= f;

    const newX = ball.x + ball.vx * sdt;
    const newZ = ball.z + ball.vz * sdt;

    // Check leading edge in movement direction so ball bounces at its surface, not its centre
    const cR = BR * 0.93;
    const okX = gridPassable(newX, ball.z) &&
                (!ball.vx || gridPassable(newX + Math.sign(ball.vx) * cR, ball.z));
    const okZ = gridPassable(ball.x, newZ) &&
                (!ball.vz || gridPassable(ball.x, newZ + Math.sign(ball.vz) * cR));
    if (okX) { ball.x = newX; } else { ball.vx *= -RESTITUTION; }
    if (okZ) { ball.z = newZ; } else { ball.vz *= -RESTITUTION; }
  }

  // Hard clamp — prevents escape through rounded corners where mesh has no wall.
  // Right side (x > MX) is intentionally unclamped: the hole exit is there.
  const EDGE = 0.12;
  if (ball.x < -(MX - EDGE)) { ball.x = -(MX - EDGE); ball.vx =  Math.abs(ball.vx) * RESTITUTION; }
  if (ball.z < -(MZ - EDGE)) { ball.z = -(MZ - EDGE); ball.vz =  Math.abs(ball.vz) * RESTITUTION; }
  if (ball.z >  (MZ - EDGE)) { ball.z =  (MZ - EDGE); ball.vz = -Math.abs(ball.vz) * RESTITUTION; }

  const fy = cellFloorY(ball.x, ball.z);
  ballMesh.position.set(ball.x, fy + BR, ball.z);
  blobMesh.position.set(ball.x, fy + 0.005, ball.z);
}

/* ══════════════════════════════════════════════
   TIMER
══════════════════════════════════════════════ */
let timerID = null, elapsed = 0;
const fmt = () =>
  `${String(Math.floor(elapsed / 60)).padStart(2, '0')}:${String(elapsed % 60).padStart(2, '0')}`;
function startTimer() {
  elapsed = 0; clearInterval(timerID);
  timerID = setInterval(() => { elapsed++; document.getElementById('hud-timer').textContent = fmt(); }, 1000);
}
function stopTimer() { clearInterval(timerID); }

/* ══════════════════════════════════════════════
   GAME STATE
══════════════════════════════════════════════ */
let state = 'ready';
const scrReady = document.getElementById('scr-ready');
const scrWin   = document.getElementById('scr-win');
const hud      = document.getElementById('hud');

function startGame() {
  if (!ballMesh) {
    document.getElementById('loading-msg').style.display = 'block';
    document.getElementById('loading-msg').textContent = 'Proszę czekać — model się wczytuje…';
    return;
  }
  scrReady.classList.remove('on');
  hud.classList.add('on');
  tiltX = targetTiltX = 0; tiltZ = targetTiltZ = 0;
  mazeGroup.rotation.set(0, 0, 0);
  resetBallPos();
  lastT = performance.now();
  state = 'playing';
  startTimer();
}

function winGame() {
  state = 'win'; stopTimer();
  document.getElementById('win-time').textContent = 'Time: ' + fmt();

  // Reset GIF by re-setting src (forces replay from frame 1)
  const gifImg = document.getElementById('win-gif');
  const gifWrap = document.getElementById('win-gif-wrap');
  const winContent = document.getElementById('win-content');
  gifImg.src = '';
  gifImg.src = 'hurray.gif';
  gifWrap.classList.remove('hidden');
  winContent.classList.remove('visible');

  scrWin.classList.add('on');

  // Hide GIF after ~3s, fade in content
  setTimeout(() => {
    gifWrap.classList.add('hidden');
    setTimeout(() => winContent.classList.add('visible'), 600);
  }, 3000);
}

function restart() {
  scrWin.classList.remove('on');
  hud.classList.remove('on');
  document.getElementById('hud-timer').textContent = '00:00';
  stopTimer();
  tiltX = targetTiltX = 0; tiltZ = targetTiltZ = 0;
  mazeGroup.rotation.set(0, 0, 0);
  state = 'ready';
  scrReady.classList.add('on');
}

document.getElementById('btn-play').addEventListener('click', startGame);
document.getElementById('btn-retry').addEventListener('click', restart);

document.getElementById('btn-copy').addEventListener('click', () => {
  const code = document.getElementById('promo-code').textContent;
  navigator.clipboard.writeText(code).then(() => {
    const el = document.getElementById('copy-confirm');
    el.textContent = 'Copied!';
    setTimeout(() => { el.textContent = ''; }, 2000);
  });
});

/* ══════════════════════════════════════════════
   INPUT
══════════════════════════════════════════════ */
const keys = {};
document.addEventListener('keydown', e => {
  keys[e.key] = true;
  if (['ArrowLeft','ArrowRight','ArrowUp','ArrowDown'].includes(e.key)) e.preventDefault();
  if (e.key === 'Escape' && state === 'playing') {
    resetBallPos(); targetTiltX = 0; targetTiltZ = 0;
  }
});
document.addEventListener('keyup', e => { keys[e.key] = false; });

/* ══════════════════════════════════════════════
   RENDER LOOP
══════════════════════════════════════════════ */
scrReady.classList.add('on');
lastT = performance.now();

renderer.setAnimationLoop(now => {
  const dt = Math.min((now - lastT) / 1000, 0.05);
  lastT = now;

  if (state === 'playing') {
    if (keys['ArrowLeft'])  targetTiltZ = Math.min( MAX_TILT, targetTiltZ + TILT_STEP);
    if (keys['ArrowRight']) targetTiltZ = Math.max(-MAX_TILT, targetTiltZ - TILT_STEP);
    if (keys['ArrowUp'])    targetTiltX = Math.max(-MAX_TILT, targetTiltX - TILT_STEP);
    if (keys['ArrowDown'])  targetTiltX = Math.min( MAX_TILT, targetTiltX + TILT_STEP);

    applyTilt();
    physicsTick(dt);

    // Win check
    if (!ball.dropping) {
      if (holeFound) {
        // Ball rolled into the hole (right-wall exit)
        if (ball.x > holeX - 0.35 && Math.abs(ball.z - holeZ) < 0.9) winGame();
      } else {
        const dx = ball.x - goalX, dz = ball.z - goalZ;
        if (dx * dx + dz * dz < 0.45 * 0.45) winGame();
      }
    }

  }

  renderer.render(scene, camera);
});
</script>
</body>
